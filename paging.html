<!doctype html>
<html>
  <head>
    <title>Advanced Paging Simulator</title>
    <link rel="stylesheet" href="CSS/style.css" />
  <canvas id="network"></canvas>
  </head>
  <body>
    <div class="container">
      <h1>Advanced Paging Simulation</h1>

      <div class="input-section">
        <label>Number of Programs:</label>
        <input type="number" id="numPrograms" />

        <label>Program Sizes (comma separated):</label>
        <input type="text" id="programSizes" placeholder="10,6" />

        <label>Page Size:</label>
        <input type="number" id="pageSize" />

        <label>Physical Memory Size:</label>
        <input type="number" id="physicalMemory" />

        <label>Reference String:</label>
        <input type="text" id="refString" placeholder="0 1 2 3 4 5" />

        <label>Algorithm:</label>
        <select id="algorithm">
          <option value="FIFO">FIFO</option>
          <option value="LRU">LRU</option>
        </select>

        <button onclick="runPaging()">Run Simulation</button>
      </div>

      <div id="output"></div>

      <br />
      <a href="index.html">← Back</a>
    </div>

    <script src="JS/paging.js"></script>
    <script>
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];

// create nodes
for (let i = 0; i < 80; i++) {
    nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 1,
        vy: (Math.random() - 0.5) * 1
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // draw lines
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            let dx = nodes[i].x - nodes[j].x;
            let dy = nodes[i].y - nodes[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 120) {
                ctx.strokeStyle = "rgba(56,189,248,0.3)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
            }
        }
    }

    // draw nodes
    nodes.forEach(n => {
        ctx.fillStyle = "#38bdf8";
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
        ctx.fill();

        // move
        n.x += n.vx;
        n.y += n.vy;

        // bounce
        if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();
</script>
  </body>
</html>
