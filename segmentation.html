<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segmentation Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: #1e293b;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background: #38bdf8;
            cursor: pointer;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
        }

        .ram {
            height: 90%;
            border: 2px solid white;
            display: flex;
            flex-direction: column;
        }

        .block {
            border-bottom: 1px solid black;
            padding: 5px;
            font-size: 14px;
        }

        .free {
            background: #334155;
        }

        .segment {
            background: #22c55e;
            color: black;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid white;
            padding: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT PANEL: PROCESS INPUT -->
    <div class="panel">
        <h2>Processes</h2>
        <input type="text" id="processName" placeholder="Enter process (e.g. chrome.exe)">
        <input type="number" id="processSize" placeholder="Total Size (MB)">
        <button onclick="addProcess()">Add Process</button>

        <div style="margin-top:10px; font-size:14px;">
            <strong>RAM:</strong> 2048 MB (Fixed)
            <br>
            <strong>Used:</strong> <span id="usedMem">0</span> MB
            <br>
            <strong>Free:</strong> <span id="freeMem">2048</span> MB
        </div>

        <ul id="processList"></ul>
    </div>

    <!-- CENTER PANEL: RAM VISUALIZATION -->
    <div class="panel">
        <h2>RAM (0 → 2048 MB)</h2>
        <div class="ram" id="ramBox" style="position:relative;">
            <!-- Memory Blocks will appear here -->
        </div>
    </div>

    <!-- RIGHT PANEL: SEGMENT TABLE -->
    <div class="panel">
        <h2>Segment Table (Selected Process)</h2>
        <table>
            <thead>
                <tr>
                    <th>Segment</th>
                    <th>Base</th>
                    <th>Limit</th>
                </tr>
            </thead>
            <tbody id="segmentTable">
                <!-- Filled dynamically -->
            </tbody>
        </table>
    </div>

</div>

<script src="JS/segmentation.js"></script>

</body>
</html>
