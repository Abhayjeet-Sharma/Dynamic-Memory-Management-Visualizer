<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Replacement Simulator</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="container">
    <h1>Page Replacement Simulator</h1>

    <div class="input-section">
        <label>Reference String:</label>
        <input type="text" id="refString" placeholder="Example: 7 0 1 2 0 3 0 4">

        <label>Number of Frames:</label>
        <input type="number" id="frames" placeholder="Example: 3">

        <label>Algorithm:</label>
        <select id="algorithm">
            <option value="FIFO">FIFO</option>
            <option value="LRU">LRU</option>
        </select>

        <button onclick="simulate()">Simulate</button>
    </div>

    <div id="output"></div>

    <br>
    <a href="index.html">← Back to Home</a>
</div>

<script src="JS/replacement.js"></script>
</body>
</html>
